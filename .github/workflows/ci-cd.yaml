name: CI Build & (optional) Deploy

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      OWNER: ${{ github.repository_owner }}
      REPO: ${{ github.event.repository.name }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to GHCR
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.CR_PAT || secrets.GITHUB_TOKEN }}

    - name: Build and push backend image
      uses: docker/build-push-action@v4
      with:
        context: ./gps-tracker
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ github.repository }}/gps-tracker:latest
          ${{ env.REGISTRY }}/${{ github.repository }}/gps-tracker:${{ github.sha }}

    - name: Build and push frontend image
      uses: docker/build-push-action@v4
      with:
        context: ./gps-frontend
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ github.repository }}/gps-frontend:latest
          ${{ env.REGISTRY }}/${{ github.repository }}/gps-frontend:${{ github.sha }}

    - name: Optional: deploy to Kubernetes
      if: ${{ secrets.KUBE_CONFIG != '' }}
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'

    - name: Apply k8s manifests (if KUBE_CONFIG provided)
      if: ${{ secrets.KUBE_CONFIG != '' }}
      env:
        KUBECONFIG: ${{ runner.temp }}/kubeconfig
      run: |
        echo "$KUBE_CONFIG" | base64 --decode > $KUBECONFIG
        kubectl apply -f k8s/